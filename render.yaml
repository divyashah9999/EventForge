services:
  - type: web
    name: eventforge
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_MASTER_PAGE_ID
        sync: false
